<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay Kỳ Diệu - Mầm Non</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #0d122c;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 1280px;
            height: 720px;
            margin: 0 auto;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            background: radial-gradient(circle at center, #1c3d7d 0%, #0d122c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            padding: 0 40px;
        }

        /* Bảng lịch sử - Thiết kế chuẩn theo image_887e64.png và watermarked_img_1925414606006836648.png */
        .history-panel {
            width: 340px;
            height: 560px;
            background: #111827;
            border-radius: 24px;
            border: 2px solid #1f2937;
            padding: 30px 24px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .history-title {
            font-size: 22px;
            text-transform: uppercase;
            color: #ffd100;
            border-bottom: 3px solid #ffd100;
            padding-bottom: 12px;
            margin-bottom: 24px;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .history-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-right: 4px;
        }
            /* Tùy chỉnh thanh cuộn cho bảng lịch sử */
            .history-list::-webkit-scrollbar {
                width: 6px;
            }

            .history-list::-webkit-scrollbar-track {
                background: rgba(255,255,255,0.02);
                border-radius: 3px;
            }

            .history-list::-webkit-scrollbar-thumb {
                background: rgba(255,255,255,0.1);
                border-radius: 3px;
            }

        .history-item {
            background: #1f293d;
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            border-left: 6px solid #2ebf5f;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Vòng quay */
        .wheel-main-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 620px;
            height: 700px;
        }

        .banner-top {
            background: #e63946;
            border: 8px solid #f1c40f;
            border-bottom: none;
            padding: 10px 40px;
            border-radius: 120px 120px 0 0;
            text-align: center;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
            position: relative;
            z-index: 12;
            width: 400px;
            top: 10px;
        }

            .banner-top h1 {
                font-size: 28px;
                color: #fffde7;
                text-transform: uppercase;
                font-weight: 900;
                letter-spacing: 1.5px;
                text-shadow: 3px 3px 0px #7b1fa2, -3px -3px 0px #7b1fa2, 3px -3px 0px #7b1fa2, -3px 3px 0px #7b1fa2;
                line-height: 1.2;
            }

        .banner-leds {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .bled {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            animation: flash 0.4s infinite alternate;
        }

            .bled:nth-child(1) {
                top: 14px;
                left: 55px;
            }

            .bled:nth-child(2) {
                top: 8px;
                left: 115px;
                animation-delay: 0.15s;
            }

            .bled:nth-child(3) {
                top: 6px;
                left: 200px;
            }

            .bled:nth-child(4) {
                top: 8px;
                left: 285px;
                animation-delay: 0.15s;
            }

            .bled:nth-child(5) {
                top: 14px;
                left: 345px;
            }

        @keyframes flash {
            0% {
                background: #fff;
                box-shadow: 0 0 8px #fff, 0 0 15px #ffeb3b;
            }

            100% {
                background: #ff9800;
                box-shadow: 0 0 2px #ff9800;
            }
        }

        .wheel-outer-ring {
            width: 550px;
            height: 550px;
            border-radius: 50%;
            background: #f1c40f;
            border: 12px solid #f39c12;
            position: relative;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            margin-top: -10px;
        }

        .ring-leds {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .rled {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            left: calc(50% - 8px);
            top: 6px;
            transform-origin: 8px 259px;
            box-shadow: 0 0 8px #fff;
        }

            .rled:nth-child(even) {
                background: #ffeb3b;
                animation: flash 0.3s infinite alternate;
            }

            .rled:nth-child(1) {
                transform: rotate(0deg);
            }

            .rled:nth-child(2) {
                transform: rotate(22.5deg);
            }

            .rled:nth-child(3) {
                transform: rotate(45deg);
            }

            .rled:nth-child(4) {
                transform: rotate(67.5deg);
            }

            .rled:nth-child(5) {
                transform: rotate(90deg);
            }

            .rled:nth-child(6) {
                transform: rotate(112.5deg);
            }

            .rled:nth-child(7) {
                transform: rotate(135deg);
            }

            .rled:nth-child(8) {
                transform: rotate(157.5deg);
            }

            .rled:nth-child(9) {
                transform: rotate(180deg);
            }

            .rled:nth-child(10) {
                transform: rotate(202.5deg);
            }

            .rled:nth-child(11) {
                transform: rotate(225deg);
            }

            .rled:nth-child(12) {
                transform: rotate(247.5deg);
            }

            .rled:nth-child(13) {
                transform: rotate(270deg);
            }

            .rled:nth-child(14) {
                transform: rotate(292.5deg);
            }

            .rled:nth-child(15) {
                transform: rotate(315deg);
            }

            .rled:nth-child(16) {
                transform: rotate(337.5deg);
            }

        .wheel-plate-svg {
            width: 500px;
            height: 500px;
            border-radius: 50%;
            border: 8px solid #ffffff;
            background-color: #fff;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        /* Chữ thiết kế sát viền chuẩn xác từ ảnh image_8873b4.jpg */
        .wheel-txt {
            font-size: 16px;
            font-weight: 900;
            fill: #ffffff;
            stroke: #111111;
            stroke-width: 4px;
            paint-order: stroke fill;
            text-anchor: middle;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pointer-top {
            position: absolute;
            top: 116px;
            z-index: 15;
            width: 40px;
            height: 60px;
            background-color: #d32f2f;
            border: 4px solid #fffde7;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            box-shadow: 0 5px 10px rgba(0,0,0,0.35);
            display: flex;
            justify-content: center;
            align-items: center;
            transform: rotate(180deg);
        }

            .pointer-top::after {
                content: '';
                width: 12px;
                height: 12px;
                background: #ffeb3b;
                border-radius: 50%;
            }

        .center-spin-btn {
            position: absolute;
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, #ffeb3b 0%, #fbc02d 100%);
            border: 6px solid #f39c12;
            border-radius: 50%;
            z-index: 16;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4), inset 0 -3px 5px rgba(0,0,0,0.2);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: #d32f2f;
            transition: transform 0.1s;
        }

            .center-spin-btn:hover {
                transform: scale(1.05);
            }

            .center-spin-btn:active {
                transform: scale(0.95);
            }

            .center-spin-btn.disabled {
                background: #94a3b8 !important;
                color: #cbd5e1 !important;
                border-color: #cbd5e1 !important;
                cursor: not-allowed;
                box-shadow: none !important;
            }

        .wheel-stand {
            width: 300px;
            height: 40px;
            background: linear-gradient(to bottom, #c62828, #880e4f);
            border-radius: 14px 14px 4px 4px;
            margin-top: -16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            z-index: 9;
            border-bottom: 6px solid #560432;
        }

        .counter-box {
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .counter-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .stars-container {
            display: flex;
            gap: 6px;
        }

        .star {
            font-size: 22px;
            color: #ffd100;
            text-shadow: 0 0 6px rgba(255,209,0,0.5);
            transition: all 0.4s;
        }

            .star.used {
                color: #475569;
                text-shadow: none;
                transform: scale(0.8);
            }

        .popup-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(4px);
        }

            .popup-overlay.active {
                opacity: 1;
                pointer-events: auto;
            }

        .popup-content {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            width: 450px;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            border: 4px solid #ffd100;
            box-shadow: 0 0 40px rgba(255,209,0,0.4);
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .popup-overlay.active .popup-content {
            transform: scale(1);
        }

        .popup-icon {
            font-size: 65px;
            margin-bottom: 10px;
            animation: bounce 0.8s infinite alternate;
        }

        @keyframes bounce {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-10px);
            }
        }

        .popup-content h2 {
            font-size: 28px;
            color: #fff;
            text-transform: uppercase;
            font-weight: 900;
        }

        .popup-prize {
            font-size: 30px;
            color: #ffd100;
            font-weight: 900;
            margin: 22px 0;
            text-shadow: 0 0 12px rgba(255,209,0,0.5);
            text-transform: uppercase;
        }

        .popup-btn {
            background: #ff8500;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(255,133,0,0.45);
            transition: background 0.2s;
            text-transform: uppercase;
        }

            .popup-btn:hover {
                background: #ffa500;
            }
    </style>
</head>
<body>

    <div class="slide-container">
        <!-- Bảng lịch sử được khôi phục hiển thị cố định sang trọng -->
        <div class="history-panel" id="historyPanel">
            <div class="history-title">Hình khối đã học</div>
            <ul class="history-list" id="historyList"></ul>
        </div>

        <div class="wheel-main-container" id="wheelContainer">
            <div class="banner-top">
                <div class="banner-leds">
                    <div class="bled"></div><div class="bled"></div><div class="bled"></div><div class="bled"></div><div class="bled"></div>
                </div>
                <h1>Vòng Quay<br>Kỳ Diệu</h1>
            </div>

            <div class="pointer-top"></div>

            <div class="wheel-outer-ring">
                <div class="ring-leds">
                    <div class="rled"></div><div class="rled"></div><div class="rled"></div><div class="rled"></div>
                    <div class="rled"></div><div class="rled"></div><div class="rled"></div><div class="rled"></div>
                    <div class="rled"></div><div class="rled"></div><div class="rled"></div><div class="rled"></div>
                    <div class="rled"></div><div class="rled"></div><div class="rled"></div><div class="rled"></div>
                </div>

                <svg class="wheel-plate-svg" id="wheel" viewBox="0 0 500 500">
                    <g transform="translate(250, 250)">

                        <!-- Ô 1: HÌNH VUÔNG (Màu Xanh Dương) -->
                        <path d="M 0 0 L -125 -216.5 A 250 250 0 0 1 125 -216.5 Z" fill="#2196f3" />
                        <g transform="rotate(0)">
                            <rect x="-20" y="-135" width="40" height="40" fill="#ffffff" filter="drop-shadow(0 3px 2px rgba(0,0,0,0.15))" />
                            <text x="0" y="-205" class="wheel-txt">Hình Vuông</text>
                        </g>

                        <!-- Ô 2: HÌNH TAM GIÁC (Màu Xanh Lá) -->
                        <path d="M 0 0 L 125 -216.5 A 250 250 0 0 1 250 0 Z" fill="#2ebf5f" />
                        <g transform="rotate(60)">
                            <polygon points="0,-140 -20,-105 20,-105" fill="#ffffff" filter="drop-shadow(0 3px 2px rgba(0,0,0,0.15))" />
                            <text x="0" y="-205" class="wheel-txt">Hình Tam Giác</text>
                        </g>

                        <!-- Ô 3: HÌNH CHỮ NHẬT (Màu Tím) -->
                        <path d="M 0 0 L 250 0 A 250 250 0 0 1 125 216.5 Z" fill="#9c27b0" />
                        <g transform="rotate(120)">
                            <rect x="-30" y="-130" width="60" height="32" fill="#ffffff" filter="drop-shadow(0 3px 2px rgba(0,0,0,0.15))" />
                            <text x="0" y="-205" class="wheel-txt" transform="rotate(180, 0, -205)">Hình Chữ Nhật</text>
                        </g>

                        <!-- Ô 4: HÌNH TRÁI TIM (Màu Hồng) -->
                        <path d="M 0 0 L 125 216.5 A 250 250 0 0 1 -125 216.5 Z" fill="#e91e63" />
                        <g transform="rotate(180)">
                            <path d="M 0,-135 C -25,-155 -40,-120 0,-105 C 40,-120 25,-155 0,-135 Z" fill="#ffffff" filter="drop-shadow(0 3px 2px rgba(0,0,0,0.15))" />
                            <text x="0" y="-205" class="wheel-txt" transform="rotate(180, 0, -205)">Hình Trái Tim</text>
                        </g>

                        <!-- Ô 5: HÌNH NGÔI SAO (Màu Vàng) -->
                        <path d="M 0 0 L -125 216.5 A 250 250 0 0 1 -250 0 Z" fill="#ffd100" />
                        <g transform="rotate(240)">
                            <path d="M 0,-140 L 8,-120 L 28,-120 L 12,-108 L 18,-88 L 0,-100 L -18,-88 L -12,-108 L -28,-120 L -8,-120 Z" fill="#ffffff" filter="drop-shadow(0 3px 2px rgba(0,0,0,0.15))" />
                            <text x="0" y="-205" class="wheel-txt" transform="rotate(180, 0, -205)">Hình Ngôi Sao</text>
                        </g>

                        <!-- Ô 6: HÌNH TRÒN (Màu Cam) -->
                        <path d="M 0 0 L -250 0 A 250 250 0 0 1 -125 -216.5 Z" fill="#ff9800" />
                        <g transform="rotate(300)">
                            <circle cx="0" cy="-125" r="20" fill="#ffffff" filter="drop-shadow(0 3px 2px rgba(0,0,0,0.15))" />
                            <text x="0" y="-205" class="wheel-txt">Hình Tròn</text>
                        </g>
                    </g>
                </svg>

                <div class="center-spin-btn" id="spinBtn" onclick="spinWheel()">★</div>
            </div>

            <div class="wheel-stand"></div>

            <div class="counter-box">
                <div class="counter-title">Lượt chơi của bé</div>
                <div class="stars-container" id="starsContainer">
                    <span class="star">★</span><span class="star">★</span><span class="star">★</span>
                    <span class="star">★</span><span class="star">★</span><span class="star">★</span>
                </div>
            </div>
        </div>

        <div class="popup-overlay" id="popup">
            <div class="popup-content">
                <div class="popup-icon">✨</div>
                <h2>Hoan Hô Bé!</h2>
                <p style="color: #cbd5e1; font-size: 15px;">Bé đã quay trúng vào khối:</p>
                <div class="popup-prize" id="popupPrize">HÌNH TRÒN</div>
                <button class="popup-btn" onclick="closePopup()">Học tiếp nào</button>
            </div>
        </div>
    </div>

    <script>
        const shapes = [
            { name: "Hình Vuông", color: "#2196f3" },
            { name: "Hình Tam Giác", color: "#2ebf5f" },
            { name: "Hình Chữ Nhật", color: "#9c27b0" },
            { name: "Hình Trái Tim", color: "#e91e63" },
            { name: "Hình Ngôi Sao", color: "#ffd100" },
            { name: "Hình Tròn", color: "#ff9800" }
        ];

        let maxSpins = 6;
        let currentSpins = 0;
        let isSpinning = false;
        let currentRotation = 0;

        function spinWheel() {
            if (isSpinning || currentSpins >= maxSpins) return;

            isSpinning = true;
            currentSpins++;

            const stars = document.getElementById('starsContainer').children;
            stars[maxSpins - currentSpins].classList.add('used');

            const spinBtn = document.getElementById('spinBtn');
            spinBtn.classList.add('disabled');

            const targetIndex = Math.floor(Math.random() * 6);

            // Công thức tính toán chuẩn góc quay dừng ở giữa ô
            const targetDegrees = 360 - (targetIndex * 60);
            const extraRounds = 6 * 360;

            currentRotation += extraRounds + targetDegrees - (currentRotation % 360);

            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                showResult(shapes[targetIndex]);
            }, 4000);
        }

        function showResult(result) {
            document.getElementById('popupPrize').innerText = result.name.toUpperCase();
            document.getElementById('popup').classList.add('active');

            var duration = 2 * 1000; var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 4, angle: 55, spread: 60, origin: { x: 0 } });
                confetti({ particleCount: 4, angle: 125, spread: 60, origin: { x: 1 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());

            // Thêm lịch sử học chuẩn giao diện bo góc viền màu từ ảnh minh họa
            const historyList = document.getElementById('historyList');
            const li = document.createElement('li');
            li.className = 'history-item';
            li.style.borderLeftColor = result.color;
            li.innerText = `Lần ${currentSpins}: Bé tìm thấy ${result.name}`;
            historyList.insertBefore(li, historyList.firstChild);
        }

        function closePopup() {
            document.getElementById('popup').classList.remove('active');
            isSpinning = false;

            const spinBtn = document.getElementById('spinBtn');
            if (currentSpins >= maxSpins) {
                spinBtn.innerText = "✖";
                spinBtn.style.fontSize = "26px";
            } else {
                spinBtn.classList.remove('disabled');
            }
        }
    </script>
</body>
</html>
